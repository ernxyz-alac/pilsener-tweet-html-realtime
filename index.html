<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Pilsener tweets</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        @font-face {
            font-family: "Pilsener Font";
            src: url("./font/pilsener-font.ttf");
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }

        body {
            font-family: "Pilsener Font", sans-serif;
            color: #fff;
        }

        #main-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #background-img {
            position: absolute;
            inset: 0;
            background-image: url('./img/art.webp');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        #tweet-container {
            position: absolute;
            z-index: 3;
            overflow: hidden;
        }

        #tweet-content {
            width: 100%;
            height: 100%;

            display: flex;
            flex-direction: column;
            justify-content: center;

            line-height: 1;
            overflow: hidden;
        }

        #tweet-text,
        #tweet-user {
            display: block;
        }

        #tweet-user {
            margin-top: 6px;
        }

        /* 768x320 */
        @media (width: 768px) and (height: 320px) {
            #tweet-container {
                top: 25%;
                left: 2%;

                width: 360px;
                height: 140px;
            }
        }

        /* 600x800 */
        @media (width: 600px) and (height: 800px) {
            #tweet-container {
                top: 60%;
                left: 22%;

                width: 330px;
                height: 180px;
            }
        }

        /* fallback */
        @media not all and (width: 768px) and (height: 320px) {
            @media not all and (width: 600px) and (height: 800px) {
                #tweet-container {
                    top: 12%;
                    left: 28%;

                    width: 360px;
                    height: 140px;

                    background-color: rgba(255,128,0,.5);
                }
            }
        }
    </style>
</head>

<body>

<div id="main-container">

    <div id="background-img"></div>

    <div id="tweet-container">
        <div id="tweet-content">

            <span id="tweet-text">
                Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nunc scelerisque lorem eget. Donec euismod, nisl eget consectetur.
            </span>

            <!--<span id="tweet-user">
                - Digger
            </span>-->

        </div>
    </div>

</div>

<script>
function fitTweetText() {
    const container = document.getElementById('tweet-container');
    const content = document.getElementById('tweet-content');

    if (!container || !content) return;

    let low = 8;
    let high = 150;
    let best = 8;

    while (low <= high) {
        const mid = Math.floor((low + high) / 2);

        content.style.fontSize = mid + 'px';

        const fits =
            content.scrollWidth <= container.clientWidth &&
            content.scrollHeight <= container.clientHeight;

        if (fits) {
            best = mid;
            low = mid + 1;
        } else {
            high = mid - 1;
        }
    }

    content.style.fontSize = best + 'px';
}

async function init() {
    if (document.fonts) {
        await document.fonts.ready;
    }

    fitTweetText();
}

init();

window.addEventListener('resize', fitTweetText);

const DISPLAY_CODE = 'D3001'
const tweetTextEl = document.getElementById("tweet-text")

function isNotExpired(dateStr) {
    const [day, month, year] = dateStr.split('/').map(Number);

    const deadline = new Date(
        year,
        month - 1,
        day,
        23, 59, 59, 999
    );

    return Date.now() < deadline.getTime();
}

function extractAdType(tweet) {
  return tweet["Tipo de ad"]
}

function filterDisplayData (arr) {
  const today = new Date()
  
  return arr.filter(it => (
    // deadline, status, displayCode
    it["Elemento Vía Pública"] === DISPLAY_CODE
    && (it["Estatus"] === true || it["Estatus"] === 1 || it["Estatus"] === "TRUE" || it["Estatus"] === "true" || it["Estatus"] === "1")
    && isNotExpired(it["Deadline"])
  ))
}

function chooseTweetToDisplay(filteredArr) {
  const priorityMap = new Map([
    ["Reactivo", 1],
    ["Especial", 2],
    ["AON", 3],
  ]);

  console.log(filteredArr)

  const highestPriority = Math.min(
    ...filteredArr.map(
      tweet => priorityMap.get(tweet["Tipo de ad"]) ?? Infinity
    )
  );

  const candidates = filteredArr.filter(
    tweet =>
      (priorityMap.get(tweet["Tipo de ad"]) ?? Infinity) === highestPriority
  );

  return candidates[
    Math.floor(Math.random() * candidates.length)
  ];
}

async function loadTweets() {
    try {
      const response = await fetch(`http://localhost:7777/?displayCode=${DISPLAY_CODE}`);
      const { data: rawData } = await response.json();

      const data = filterDisplayData(rawData)

      const tweetToDisplay = chooseTweetToDisplay(data);

      tweetTextEl.innerText = tweetToDisplay["Texto"]
    } catch (err) {
      console.error(err);
    }
}

loadTweets();

</script>

</body>
</html>
